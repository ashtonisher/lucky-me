<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="바나플 추첨기" />
    <title>Lucky Me (추첨기)</title>
    <link rel="shortcut icon" href="img/favicon.svg" type="image/x-icon" />
    <link rel="stylesheet" href="css/style.css" type="text/css" />
  </head>

  <body>
    <nav id="left-panel">
      <button id="left-toggle-button"></button>
      <div class="left-container">
        <article class="content-box user-box">
          <h3 class="title">내 이름</h3>
          <div class="user-info">
            <span id="my-nickname"></span>
            <button id="nickname-edit-button" type="button" title="이름 바꾸기">
              ✏️
            </button>
          </div>
        </article>
        <article class="content-box connected-box">
          <h3 class="title">접속자 <span id="connected-count">0</span>명</h3>
          <section class="members scroll-content content">
            <ul id="connected-list" class="member-list"></ul>
          </section>
        </article>
        <article class="menu-suggest content-box">
          <h3 class="menu title">🍛🍜🍱🍚</h3>
          <section class="menu-info content">
            <p class="menu-name">메뉴 추천</p>
            <span class="menu-price"></span>
          </section>
          <button id="menu-reload-button">draw</button>
          <p class="noti menu-update">Update: 2023.02.08</p>
        </article>
      </div>
    </nav>
    <main class="main">
      <h1 id="main-title">Lucky Me</h1>
      <h2 id="today"></h2>
      <h2 id="winner">추첨이 필요합니다</h2>
      <div id="participant-control">
        <button id="participant-minus" type="button">−</button>
        <span id="participant-count"></span>
        <button id="participant-plus" type="button">+</button>
      </div>
      <button id="roulette-button" type="button">추첨하기</button>
      <section id="log-container">
        <h3 id="log-title">Log</h3>
        <ul id="log-list" class="scroll-content"></ul>
      </section>
    </main>
    <button id="nickname-floating" type="button"></button>
    <div id="nickname-modal">
      <div id="nickname-modal-box">
        <button id="nickname-close" type="button">✕</button>
        <h2>이름 설정</h2>
        <input
          id="nickname-input"
          type="text"
          maxlength="10"
          placeholder="이름 (최대 10자)"
        />
        <p id="nickname-error">사용할 이름을 입력하세요</p>
        <button id="nickname-confirm" type="button">확인</button>
      </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="js/main.js" type="module"></script>
    <script src="js/aside.js"></script>
  </body>
</html>
