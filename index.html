<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="바나플 추첨기" />
  <title>Lucky Me (추첨기)</title>
  <link rel="shortcut icon" href="img/favicon.svg" type="image/x-icon" />
  <link rel="stylesheet" href="css/style.css" type="text/css" />
</head>

<body>
  <main>
    <h1 id="main-title">Lucky Me</h1>
    <h2 id="today"></h2>
    <h2 id="winner">추첨이 필요합니다</h2>
    <button id="roulette-button" type="button">추첨하기</button>
    <section id="log-container">
      <h3 id="log-title">Log</h3>
      <ul id="log-list" class="scroll-content"></ul>
    </section>
    <aside id="aside">
      <button id="aside-toggle-button"></button>
      <div class="aside-container">
        <article class="menu-suggest content-box">
          <h3 class="menu title">🍛🍜🍱🍚</h3>
          <section class="menu-info content">
            <p class="menu-name">추천메뉴</p>
            <span class="menu-price">1,000원</span>
          </section>
          <button id="menu-reload-button">draw</button>
          <p class="noti menu-update">Update: 2023.01.20</p>
        </article>
        <article class="member-box content-box">
          <h3 class="title">Member</h3>
          <section class="members scroll-content content">
            <ul class="member-list">
              <li><input id="member01" type="checkbox" checked /><label for="member01">강경일</label></li>
              <li><input id="member02" type="checkbox" /><label for="member02">강영서</label></li>
              <li><input id="member03" type="checkbox" checked /><label for="member03">이승재</label></li>
              <!-- <li><input id="member04" type="checkbox" /><label for="member04">이진희</label></li> -->
              <li><input id="member05" type="checkbox" checked /><label for="member04">임준수</label></li>
              <li><input id="member06" type="checkbox" checked /><label for="member05">장민우</label></li>
              <li><input id="member07" type="checkbox" checked /><label for="member06">최경환</label></li>
            </ul>
          </section>
        </article>
        <article class="log-box content-box">
          <h3 class="title">Lucky Log</h3>
          <section class="scroll-content content">
            <ul class="lucky-log-list">
              <li>test_log_1</li>
              <li>test_log_2</li>
              <li>test_log_3</li>
              <li>test_log_4</li>
              <li>test_log_5</li>
              <!-- <li>test_log_6</li>
              <li>test_log_7</li>
              <li>test_log_8</li>
              <li>test_log_9</li>
              <li>test_log_10</li> -->
            </ul>
          </section>
        </article>
      </div>
    </aside>
  </main>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <script src="db/members.json" type="text/javascript"></script>
  <script src="db/menu-bowl.json" type="text/javascript"></script>
  <script src="db/menu-box.json" type="text/javascript"></script>
  <script src="db/menu-newsale.json" type="text/javascript"></script>
  <script src="db/menu-premium.json" type="text/javascript"></script>
  <script src="db/menu-side.json" type="text/javascript"></script>
  <script src="/js/main.js" type="module"></script>
  <script src="/js/aside.js"></script>
</body>

</html>
